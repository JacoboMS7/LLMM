<!doctype html>
<html>
  <head>
    <title>Huelva Meteo</title>
  </head>
  <body>
    <h2>Meteorología Huelva</h2>

    <button onclick="cargarDatos()">Cargar datos Huelva</button>

    <div id="resultado"></div>

    <script>
      function cargarDatos() {
        document.getElementById("resultado").innerHTML = "Cargando...";

        var xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function () {
          if (this.readyState == 4 && this.status == 200) {
            mostrarDatos(this.responseText);
          }
        };

        xhr.open(
          "GET",
          "http://www.aemet.es/xml/municipios/localidad_21041.xml",
          true,
        );
        xhr.send();
      }

      function mostrarDatos(xmlText) {
        var parser = new DOMParser();
        var xmlDoc = parser.parseFromString(xmlText, "text/xml");

        var nombre = xmlDoc.getElementsByTagName("nombre")[0].textContent;
        var dias = xmlDoc.getElementsByTagName("dia");

        var html = "<h3>" + nombre + "</h3>";

        for (var i = 0; i < dias.length; i++) {
          var dia = dias[i];
          var fecha = dia.getAttribute("fecha");

          var tempMax = dia.getElementsByTagName("maxima")[0].textContent;
          var tempMin = dia.getElementsByTagName("minima")[0].textContent;

          var cielo = dia
            .getElementsByTagName("estado_cielo")[0]
            .getAttribute("descripcion");

          var vientoDir = dia
            .getElementsByTagName("viento")[0]
            .getElementsByTagName("direccion")[0].textContent;
          var vientoVel = dia
            .getElementsByTagName("viento")[0]
            .getElementsByTagName("velocidad")[0].textContent;

          var humMax = dia
            .getElementsByTagName("humedad_relativa")[0]
            .getElementsByTagName("maxima")[0].textContent;
          var humMin = dia
            .getElementsByTagName("humedad_relativa")[0]
            .getElementsByTagName("minima")[0].textContent;

          html += "<div>";
          html += "<strong>" + fecha + ":</strong> ";
          html += "Temp: " + tempMin + "°C / " + tempMax + "°C, ";
          html += "Cielo: " + cielo + ", ";
          html += "Viento: " + vientoDir + " " + vientoVel + "km/h, ";
          html += "Humedad: " + humMin + "% - " + humMax + "%<br>";
          html += "</div>";
        }

        document.getElementById("resultado").innerHTML = html;
      }
    </script>
  </body>
</html>
