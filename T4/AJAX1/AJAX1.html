<!doctype html>
<html>
  <head>
    <style>
      .div-table {
        display: table;
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
      }
      .div-row {
        display: table-row;
      }
      .div-cell {
        display: table-cell;
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
      }
      .div-header {
        background-color: #f2f2f2;
        font-weight: bold;
      }
      button {
        padding: 10px 20px;
        background: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
        margin: 20px 0;
      }
      button:hover {
        background: #45a049;
      }
    </style>
  </head>
  <body>
    <h3>Tabla con DIVs (AJAX) - Solo Country, Company, Price, Year:</h3>
    <button onclick="loadCDs()">Cargar Catálogo CD (AJAX)</button>
    <div id="divTable" class="div-table"></div>

    <script>
      function loadCDs() {
        const xhttp = new XMLHttpRequest();
        
        xhttp.onreadystatechange = function() {
          if (this.readyState == 4) {
            if (this.status == 200) {
              console.log("AJAX cargado correctamente");
              showCDs(this.responseText);
            } else {
              console.error("Error AJAX:", this.status);
              alert("Error cargando XML. Verifica la consola.");
            }
          }
        };

        xhttp.open("GET", "cd_catalog.xml", true);
        xhttp.send();
      }

      function showCDs(xmlText) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
        const cds = xmlDoc.getElementsByTagName("CD");
        
        console.log("CDs encontrados:", cds.length);

        let divTable = `
          <div class="div-row">
            <div class="div-cell div-header">Country</div>
            <div class="div-cell div-header">Company</div>
            <div class="div-cell div-header">Price</div>
            <div class="div-cell div-header">Year</div>
          </div>
        `;

        for (let i = 0; i < cds.length; i++) {
          const country = cds[i].getElementsByTagName("COUNTRY")[0].childNodes[0].nodeValue;
          const company = cds[i].getElementsByTagName("COMPANY")[0].childNodes[0].nodeValue;
          const price = cds[i].getElementsByTagName("PRICE")[0].childNodes[0].nodeValue;
          const year = cds[i].getElementsByTagName("YEAR")[0].childNodes[0].nodeValue;

          divTable += `
            <div class="div-row">
              <div class="div-cell">${country}</div>
              <div class="div-cell">${company}</div>
              <div class="div-cell">${price}€</div>
              <div class="div-cell">${year}</div>
            </div>
          `;
        }
        
        document.getElementById("divTable").innerHTML = divTable;
      }
    </script>
  </body>
</html>
