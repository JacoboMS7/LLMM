<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto - MundoPerro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="contacto.css" />
  </head>
  <body class="layout-root">
    <nav class="mi-navbar p-3">
      <div class="container d-flex justify-content-between align-items-center">
        <a
          href="index.html"
          class="fs-3 fw-bold text-white text-decoration-none"
        >
          🐕 MundoPerro Jacobo Martín Salamanca 1ºDAW
        </a>
        <button class="nav-toggle btn btn-link p-0 d-lg-none">☰</button>
        <ul class="menu-items d-lg-flex mb-0">
          <li>
            <a
              href="index.html"
              class="text-white px-3 py-2 text-decoration-none"
              >Inicio</a
            >
          </li>
          <li>
            <a
              href="razas.html"
              class="text-white px-3 py-2 text-decoration-none"
              >Razas</a
            >
          </li>
          <li>
            <a
              href="cuidados.html"
              class="text-white px-3 py-2 text-decoration-none"
              >Cuidados</a
            >
          </li>
          <li>
            <a
              href="juguetes.html"
              class="text-white px-3 py-2 text-decoration-none"
              >Juguetes</a
            >
          </li>
          <li>
            <a
              href="contacto.html"
              class="text-white px-3 py-2 text-decoration-none active"
              >Contacto</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <main class="flex-fill">
      <div class="container my-5">
        <div class="row mb-5 fade-in scroll-reveal">
          <div class="col-12 text-center">
            <h1 class="display-4 fw-bold text-verde-perro mb-3">Contacto</h1>
            <p class="lead">
              Envíanos tus dudas sobre razas, cuidados o juguetes
            </p>
          </div>
        </div>

        <div class="row justify-content-center scroll-reveal">
          <div class="col-lg-6 col-md-8 col-12">
            <div class="form-contacto card-hover">
              <h2 class="text-verde-perro mb-4 text-center">
                Formulario de contacto
              </h2>
              <form>
                <div class="mb-3">
                  <label for="nombre" class="form-label">Nombre</label>
                  <input
                    type="text"
                    class="form-control"
                    id="nombre"
                    name="nombre"
                    placeholder="Tu nombre"
                  />
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label"
                    >Correo electrónico</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="tucorreo@ejemplo.com"
                  />
                </div>
                <div class="mb-3">
                  <label for="asunto" class="form-label">Asunto</label>
                  <input
                    type="text"
                    class="form-control"
                    id="asunto"
                    name="asunto"
                    placeholder="Asunto del mensaje"
                  />
                </div>
                <div class="mb-3">
                  <label for="mensaje" class="form-label">Mensaje</label>
                  <textarea
                    class="form-control"
                    id="mensaje"
                    name="mensaje"
                    rows="5"
                    placeholder="Escribe tu mensaje aquí..."
                  ></textarea>
                </div>
                <div class="d-grid">
                  <button type="submit" class="btn btn-verde-perro btn-lg">
                    Enviar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-marron-perro text-white text-center py-4">
      <a href="index.html" class="text-white text-decoration-none"
        >🏠 Volver al Inicio</a
      >
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="contacto.js"></script>
  </body>
</html>
