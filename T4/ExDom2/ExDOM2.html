      let n = xmlDoc.getElementsByTagName("TITLE").length;
      for (let i = 0; i < n; i++) {

            xmlDoc.getElementsByTagName("TITLE")[i].childNodes[0].nodeValue,
        );
      }

          cd.getElementsByTagName("PRICE")[0].childNodes[0].nodeValue;

          cd.getElementsByTagName("TITLE")[0].childNodes[0].nodeValue +
